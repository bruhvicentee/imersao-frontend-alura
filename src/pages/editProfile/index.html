<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="logo">
        <img src="/public/assets/icons.jpg" alt="Logo Netflix">
    </nav>

    <h1>Editar Perfil</h1>


    <input type="text" id="nameInput" placeholder="Nome">


    <h3>Configurações de classificação etária:</h3>
    <p>Mostrar títulos de todas as classificações etárias para este perfil</p>
    <button class="button">Editar</button>


    <div class="buttons">
        <button class="button save" onclick="save()">
            SALVAR
        </button>

        <button class="button" onclick="cancel()">
            CANCELAR
        </button>

        <button class="button" onclick="remove()">
            EXCLUIR PERFIL
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
